version: "3"

services:

  backend:

    build: ./server
    ports:
      - "5000:5000"

    depends_on:
      - mongo

    environment:
      - MONGO_URL=mongodb://mongo:27017/userdb

  frontend:

    build: ./client
    ports:
      - "3000:3000"

    depends_on:
      - backend

  mongo:

    image: mongo
    ports:
      - "27017:27017"